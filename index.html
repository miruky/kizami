<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ブラウザで動くメトロノームとリズム練習。正確なクリック、拍子と分割、テンポを上げる練習、タップのタイミング精度判定に対応"
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#f3efe7" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1b1916" media="(prefers-color-scheme: dark)" />
    <meta property="og:title" content="kizami — メトロノームとリズム練習" />
    <meta
      property="og:description"
      content="正確なクリック、拍子と分割、テンポを上げる練習、タップのタイミング精度判定。"
    />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Shippori+Mincho:wght@600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <title>kizami | メトロノームとリズム練習</title>
    <script>
      // 初回描画前にテーマを確定させ、ちらつきを防ぐ
      (function () {
        try {
          var saved = localStorage.getItem('kizami-theme');
          if (saved === 'light' || saved === 'dark') {
            document.documentElement.dataset.theme = saved;
          }
        } catch (e) {
          /* localStorage不可ならOS設定に従う */
        }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <noscript>kizamiは音の生成と刻みのためにJavaScriptが必要です。</noscript>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
