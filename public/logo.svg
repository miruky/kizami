<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="logo-title">
  <title id="logo-title">kizami - メトロノームのロゴ</title>
  <style>
    .bg { fill: #f4f1ec; }
    .body { stroke: #221f1a; }
    .arm { stroke: #d9772b; }
    .bob { fill: #d9772b; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #17150f; }
